name: Publish to npm

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

# Author/owner match requirement (n8n community node verification):
# The npm package author (package.json "author") must correspond to
# the GitHub repository owner. For this package:
#   npm author:   Claas Busemann <claas.busemann@maibornwolff.de>
#   GitHub owner: ClaasBusemann (https://github.com/ClaasBusemann)
# Required for verified community node status on n8n Cloud.
# See: https://docs.n8n.io/integrations/creating-nodes/deploy/submit-community-nodes/

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # npm provenance attestation (OIDC)
      contents: read    # actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
